services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aiders-redis
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
      --bind 0.0.0.0
      --protected-mode yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aiders-mysql
    ports:
      - "127.0.0.1:${MYSQL_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --skip-character-set-client-handshake
      --init-connect='SET NAMES utf8mb4; SET character_set_client = utf8mb4; SET character_set_connection = utf8mb4; SET character_set_results = utf8mb4;'
    restart: unless-stopped

  # Backend Application
  aiders-app:
    build: ./aiders-backend
    container_name: aiders-backend
    network_mode: host
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://localhost:${MYSQL_PORT}/${MYSQL_DATABASE}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - OPENVIDU_SECRET=${OPENVIDU_SECRET}
      - OPENVIDU_URL=${OPENVIDU_URL}
      - SPRING_DATA_REDIS_URL=redis://:${REDIS_PASSWORD}@localhost:${REDIS_PORT}
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  # Frontend Application
  aiders-frontend:
    build: ./aiders-frontend
    container_name: aiders-frontend
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_KAKAO_MAP_API_KEY=${KAKAO_MAP_API_KEY}
      - VITE_WS_BASE_URL=${VITE_WS_BASE_URL}
    command: sh -c "cd /app && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_CONTAINER_PORT}"
    depends_on:
      - aiders-app
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: aiders-prometheus
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: aiders-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
