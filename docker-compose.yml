services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aiders-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - aiders-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aiders-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=mydb
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aiders-network
    restart: unless-stopped

  # OpenVidu Development Server
  openvidu-server:
    image: openvidu/openvidu-dev:2.31.0
    container_name: aiders-openvidu
    ports:
      - "4443:4443"
    environment:
      - OPENVIDU_SECRET=MY_SECRET
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - aiders-network
    restart: unless-stopped

  # Aiders Backend Application
  aiders-app:
    build: ./aiders-backend
    container_name: aiders-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mydb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&zeroDateTimeBehavior=convertToNull&rewriteBatchedStatements=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - OPENVIDU_SECRET=MY_SECRET
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      openvidu-server:
        condition: service_started
    networks:
      - aiders-network
    restart: unless-stopped

  # Aiders Frontend Application
  aiders-frontend:
    build: ./aiders-frontend
    container_name: aiders-frontend
    ports:
      - "3000:5173"
    command: sh -c "cd /app && npm run dev -- --host 0.0.0.0"
    depends_on:
      - aiders-app
    networks:
      - aiders-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  aiders-network:
    driver: bridge