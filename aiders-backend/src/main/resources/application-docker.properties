spring.application.name=aiders

#it will be set build date by gradle. if this value is @build.date@, front-end is development mode
build.date=@build.date@
server.port=8080
server.address=0.0.0.0
server.servlet.contextPath=/
# Charset of HTTP requests and responses. Added to the "Content-Type" header if not set explicitly.
server.servlet.encoding.charset=UTF-8
# Enable http encoding support.
server.servlet.encoding.enabled=true
# Force the encoding to the configured charset on HTTP requests and responses.
server.servlet.encoding.force=true

# for SPA
spring.web.resources.static-locations=classpath:/dist/
spa.default-file=/dist/index.html
spring.web.resources.add-mappings=false

#database - will be overridden by environment variables
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=1000
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.data.web.pageable.one-indexed-parameters=true
spring.datasource.url=jdbc:mysql://localhost:3306/mydb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.username=root
spring.datasource.hikari.password=1234

# jwt
spring.jwt.secret=Qp$N,SPFgnrb+<taJgdtuj<>&`Qg&]Sz-TG[c%[>;W{I?yP#W,fXw%6,7j}:llb

# unit is ms. 15 * 24 * 60 * 60 * 1000 = 15days
spring.jwt.expiration=1296000000

spring.devtools.livereload.enabled=false

#gzip compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

#for health check
management.endpoints.web.base-path=/manage
management.health.db.enabled=true
management.health.default.enabled=true
management.health.diskspace.enabled=true
# ?? ?? -> never
management.endpoint.health.show-details=always
# ?? ?? -> never
management.endpoint.health.show-components=always
# ?? ?? -> ???? (health)
management.endpoints.web.exposure.include=*

#for openVidu - will be overridden by environment variables
openvidu.url=http://aiders-openvidu:4443/
openvidu.secret=MY_SECRET

# Security Debug Logging
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.team1234.aiders=INFO
logging.level.org.springframework.security.web.csrf=INFO

# Redis - Docker container hostname
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
