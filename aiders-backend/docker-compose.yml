services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aiders-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=mydb
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aiders-network

  # OpenVidu Development Server
  openvidu-server:
    image: openvidu/openvidu-dev:2.31.0
    container_name: aiders-openvidu
    ports:
      - "4443:4443"
    environment:
      - OPENVIDU_SECRET=MY_SECRET
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - aiders-network

  # Aiders Application Server
  aiders-app:
    image: aiders:latest
    container_name: aiders-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mydb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&zeroDateTimeBehavior=convertToNull&rewriteBatchedStatements=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - OPENVIDU_SECRET=MY_SECRET
    depends_on:
      - mysql
      - openvidu-server
    networks:
      - aiders-network

volumes:
  mysql_data:

networks:
  aiders-network:
    driver: bridge